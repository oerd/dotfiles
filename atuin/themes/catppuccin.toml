[theme]
name = "catppuccin"

[colors]
AlertInfo = "#8839ef"  # alerting the user at an INFO level
AlertWarn = "#fe640b"  # alerting the user at a WARN level
AlertError = "#e64553" # alerting the user at an ERROR level
Annotation = "#7287fd" # less-critical, supporting text
Base = "#eff1f5"       # default foreground color
Guidance = "#179299"   # instructing the user as help or context
Important = "#1e66f5"  # drawing the user’s attention to information
Title = "#4c4f69"      # titling a section or view

